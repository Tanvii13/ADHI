name: adhi
description: "ADHI Accessibility App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  http: ^1.2.1
  record: ^5.1.2
  path_provider: ^2.1.4
